<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساحتنا الخاصة | رغد وراشد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --card: rgba(255,255,255,0.03); }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark); color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .box { width: 85%; max-width: 400px; padding: 40px; border-radius: 25px; background: var(--card); border: 1px solid rgba(212,175,55,0.2); backdrop-filter: blur(10px); }
        h1 { color: var(--gold); margin-bottom: 5px; font-size: 1.6rem; }
        .status { font-size: 0.8rem; color: #00ff00; margin-bottom: 30px; display: block; text-shadow: 0 0 5px #00ff00; }
        .meal { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; border-right: 3px solid var(--gold); text-align: right; margin: 20px 0; }
        .stars { color: #ffcc00; margin-top: 5px; }
        footer { font-size: 0.85rem; opacity: 0.6; line-height: 1.6; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>مساحتنا الخاصة</h1>
        <span class="status">● متصل الآن بقلب رغد</span>
        <div class="meal">
            <small style="color:var(--gold)">إبداع هذا الشهر:</small>
            <div style="margin-top:5px">تارت الليمون المنعش 🍋</div>
            <div class="stars">★★★★★</div>
        </div>
        <footer>
            "كل شهر تزيدين حياتي حلاوة.. <br> شكراً لكل مجهود تبذلينه لأجلي."
        </footer>
    </div>
</body>
</html>
